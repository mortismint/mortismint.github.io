<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games List | Mortismint</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <a href="../../index.html" class="back">home</a>
        <span class="topbar-title">game <span>list</span></span>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="statsbar">
      <div class="stat-item">
        <span class="stat-dot dot-total"></span>
        Total: <span class="stat-value" id="total-games">0</span>
      </div>
      <div class="statsbar-divider"></div>
      <div class="stat-item">
        <span class="stat-dot dot-playing"></span>
        Playing: <span class="stat-value" id="playing-count">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot dot-planning"></span>
        Planning: <span class="stat-value" id="planning-count">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot dot-completed"></span>
        Completed: <span class="stat-value" id="completed-count">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot dot-paused"></span>
        Paused: <span class="stat-value" id="paused-count">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot dot-dropped"></span>
        Dropped: <span class="stat-value" id="dropped-count">0</span>
      </div>
      <div class="statsbar-divider"></div>
      <div class="stat-item">
        <span class="stat-dot dot-hours"></span>
        Hours: <span class="stat-value" id="total-hours">0</span>
      </div>
      <div class="avg-bar-wrap">
        <span class="avg-bar-label"
          >Avg completion: <span id="avg-completion">0</span>%</span
        >
        <div class="avg-bar">
          <div class="avg-bar-fill" id="avg-bar-fill"></div>
        </div>
      </div>
    </div>

    <!-- App -->
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="filter-group">
          <div class="search-wrapper">
            <i class="fas fa-magnifying-glass search-icon"></i>
            <input
              type="text"
              id="search"
              class="searchbar"
              placeholder="Search games…"
            />
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-label">Status</div>
          <button class="filter-btn active" data-status="All">All</button>
          <button class="filter-btn" data-status="Playing">
            <span>Playing</span
            ><span class="btn-dot" style="background: var(--green)"></span>
          </button>
          <button class="filter-btn" data-status="Planning">
            <span>Planning</span
            ><span class="btn-dot" style="background: var(--blue)"></span>
          </button>
          <button class="filter-btn" data-status="Ongoing">
            <span>Ongoing</span
            ><span class="btn-dot" style="background: var(--sky)"></span>
          </button>
          <button class="filter-btn" data-status="Completed">
            <span>Completed</span
            ><span class="btn-dot" style="background: var(--teal)"></span>
          </button>
          <button class="filter-btn" data-status="Paused">
            <span>Paused</span
            ><span class="btn-dot" style="background: var(--yellow)"></span>
          </button>
          <button class="filter-btn" data-status="Dropped">
            <span>Dropped</span
            ><span class="btn-dot" style="background: var(--red)"></span>
          </button>
        </div>

        <div class="filter-group">
          <div class="filter-label">Tags</div>
          <button class="filter-btn tag-filter active" data-tag="All">
            All
          </button>
          <button class="filter-btn tag-filter" data-tag="favorite">
            <span>Favorites</span
            ><span style="color: var(--yellow); font-size: 0.8rem">★</span>
          </button>
        </div>

        <div class="filter-group">
          <div class="filter-label">Sort</div>
          <select id="sort-score" class="sort-select">
            <option value="desc">Score: High → Low</option>
            <option value="asc">Score: Low → High</option>
          </select>
        </div>
      </aside>

      <!-- Main -->
      <main class="content">
        <section class="game-section" data-status="Playing">
          <div class="section-heading">
            <h2>Playing</h2>
            <span class="section-count" data-count="Playing">0</span>
          </div>
          <div id="playing-list" class="game-list"></div>
        </section>

        <section class="game-section" data-status="Planning">
          <div class="section-heading">
            <h2>Planning</h2>
            <span class="section-count" data-count="Planning">0</span>
          </div>
          <div id="planning-list" class="game-list"></div>
        </section>

        <section class="game-section" data-status="Ongoing">
          <div class="section-heading">
            <h2>Ongoing</h2>
            <span class="section-count" data-count="Ongoing">0</span>
          </div>
          <div id="ongoing-list" class="game-list"></div>
        </section>

        <section class="game-section" data-status="Completed">
          <div class="section-heading">
            <h2>Completed</h2>
            <span class="section-count" data-count="Completed">0</span>
          </div>
          <div id="completed-list" class="game-list"></div>
        </section>

        <section class="game-section" data-status="Paused">
          <div class="section-heading">
            <h2>Paused</h2>
            <span class="section-count" data-count="Paused">0</span>
          </div>
          <div id="paused-list" class="game-list"></div>
        </section>

        <section class="game-section" data-status="Dropped">
          <div class="section-heading">
            <h2>Dropped</h2>
            <span class="section-count" data-count="Dropped">0</span>
          </div>
          <div id="dropped-list" class="game-list"></div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
